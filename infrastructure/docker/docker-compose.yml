version: "3.9"
services:
  app:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.dev
    env_file:
      - ../../.env.example
    environment:
      TF_SERVING_URL: http://tensorflow-serving:8501
      DATABASE_URL: "<REDACTED_DATABASE_URL>"
    ports:
      - "8000:8000"
    depends_on:
      - tensorflow-serving
      - db

  tensorflow-serving:
    image: tensorflow/serving:2.15.0
    command: --port=8500 --rest_api_port=8501 --model_name=ai_morphasis --model_base_path=/models
    volumes:
      - ../../storage:/models
    ports:
      - "8501:8501"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_morphasis
      POSTGRES_USER: ai_morphasis
      POSTGRES_PASSWORD: ai_morphasis
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:v2.53.1
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  db_data:
