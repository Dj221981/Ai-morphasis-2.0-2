apiVersion: v1
kind: Service
metadata:
  name: ai-morphasis
  namespace: ai-morphasis
spec:
  selector:
    app: ai-morphasis
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: tensorflow-serving
  namespace: ai-morphasis
spec:
  selector:
    app: tensorflow-serving
  ports:
    - name: rest
      port: 8501
      targetPort: 8501
  type: ClusterIP
