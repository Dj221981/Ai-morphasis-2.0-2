apiVersion: apps/v1
kind: Deployment
metadata:
  name: tensorflow-serving
  namespace: ai-morphasis
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tensorflow-serving
  template:
    metadata:
      labels:
        app: tensorflow-serving
    spec:
      containers:
        - name: tensorflow-serving
          image: tensorflow/serving:2.15.0
          args:
            - --model_name=ai_morphasis
            - --model_base_path=/models
          ports:
            - containerPort: 8501
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ai-morphasis-models-pvc
