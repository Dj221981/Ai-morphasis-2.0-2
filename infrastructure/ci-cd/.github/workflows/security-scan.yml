name: Security Scan
on:
  pull_request:
  push:
jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install scan tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
      - name: Scan code
        run: bandit -r src
      - name: Scan dependencies
        run: pip-audit || true
