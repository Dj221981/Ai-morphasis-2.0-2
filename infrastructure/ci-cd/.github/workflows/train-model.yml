name: Train Model
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Train
        run: python src/training/train.py
