stages:
  - test
  - build
  - deploy

test:
  stage: test
  image: python:3.11
  script:
    - pip install -r requirements.txt
    - pytest tests/test_models.py -v

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -f infrastructure/docker/Dockerfile -t ai-morphasis:$CI_COMMIT_SHA .

deploy_staging:
  stage: deploy
  script:
    - kubectl apply -k infrastructure/kubernetes
  when: manual
