groups:
  - name: ai-morphasis-alerts
    rules:
      - alert: HighInferenceLatency
        expr: job:http_inference_latency_p95 > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High inference latency"
      - alert: TrainingJobFailures
        expr: increase(kube_job_status_failed[1h]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Training job failing"
