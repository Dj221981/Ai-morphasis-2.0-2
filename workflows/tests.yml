name: Tests

on:
  push:
    branches: [ main, Ai-morphasis, agentic-memory-system, long-term-memory ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      run: |
        pytest tests/ -v --cov=src --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install black isort pylint mypy bandit

    - name: Check code formatting with Black
      run: |
        black --check src tests --line-length=127 --verbose || true

    - name: Check import sorting with isort
      run: |
        isort --check-only src tests --verbose || true

    - name: Type checking with mypy
      run: |
        mypy src --ignore-missing-imports --pretty || true

    - name: Lint with pylint
      run: |
        pylint src --exit-zero --max-line-length=127 || true

    - name: Security check with bandit
      run: |
        bandit -r src -f json -o bandit-report.json || true
        bandit -r src --verbose || true

  performance:
    name: Performance Testing
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-benchmark memory-profiler py-spy

    - name: Run performance benchmarks
      run: |
        mkdir -p .benchmarks
        pytest tests/ -v --benchmark-only --benchmark-json=.benchmarks/output.json || true

    - name: Memory profiling
      run: |
        if [ -f tests/test_performance.py ]; then
          python -m memory_profiler tests/test_performance.py || true
        else
          echo "No performance tests found at tests/test_performance.py"
        fi

    - name: Upload benchmark results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: benchmark-results
        path: .benchmarks/
        retention-days: 30

  agent-reasoning:
    name: AI Reasoning (Learning, Research, Reasoning, Thinking)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AI reasoning evaluation
        run: python .github/scripts/run_ai_reasoning.py
