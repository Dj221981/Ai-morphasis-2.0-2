name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # -----------------------------------------------------------------------
  # Lint — syntax errors and undefined names must block the build
  # -----------------------------------------------------------------------
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install flake8
        run: pip install flake8

      - name: Syntax and undefined-name check
        # E9xx  — syntax errors, F63x — invalid escape, F7xx — undefined names,
        # F82x  — undefined names (stricter).  These are real failures, not style.
        run: flake8 app src tests --count --select=E9,F63,F7,F82 --show-source --statistics

  # -----------------------------------------------------------------------
  # Test — must pass on all supported Python versions
  # -----------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        # APP_ENV is required by the /ready endpoint; set it here so the
        # test_ready_with_app_env test has a consistent value in CI.
        env:
          APP_ENV: ci
        run: python -m pytest tests -v
